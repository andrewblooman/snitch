services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: snitch
      POSTGRES_PASSWORD: snitch
      POSTGRES_DB: snitch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snitch"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: ./backend
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://snitch:snitch@db:5432/snitch
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://snitch:snitch@db:5432/snitch
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:8000","*"]'
    volumes:
      - ./backend:/app
      - ./frontend:/app/frontend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build: ./backend
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+psycopg2://snitch:snitch@db:5432/snitch
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      REDIS_URL: redis://redis:6379/0
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_CICD_BUCKET: ${S3_CICD_BUCKET:-}
      SQS_CICD_QUEUE_URL: ${SQS_CICD_QUEUE_URL:-}
    volumes:
      - ./backend:/app
      - trivy-cache:/root/.cache/trivy
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  beat:
    build: ./backend
    command: celery -A app.worker.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg2://snitch:snitch@db:5432/snitch
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      REDIS_URL: redis://redis:6379/0
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_CICD_BUCKET: ${S3_CICD_BUCKET:-}
      SQS_CICD_QUEUE_URL: ${SQS_CICD_QUEUE_URL:-}
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  trivy-cache:
