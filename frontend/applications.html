<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snitch — Applications</title>
  <script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'dark');})();</script>
  <style>/* Inter font fallback */ body { font-family: var(--font-body); }</style>
  <link rel="stylesheet" href="/static/css/theme.css">
  <script src="/static/js/lucide.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    @keyframes slideInRight { from{transform:translateX(100px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes slideOutRight { from{transform:translateX(0);opacity:1} to{transform:translateX(100px);opacity:0} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes fadeInUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes spin { to{transform:rotate(360deg)} }
    .card { background:linear-gradient(145deg,#0f1b34 0%,#080f1d 100%);border:1px solid rgba(0,229,255,0.14);border-radius:16px;box-shadow:0 4px 32px rgba(0,0,0,.55),inset 0 1px 0 rgba(0,229,255,.06); }
    .dark-select option { background:#0d1117; }
    .modal-backdrop { position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center; }
    .app-row { cursor:pointer;transition:background 0.15s; }
    .app-row:hover { background:rgba(0,229,255,0.04) !important; }
    .sort-btn { background:none;border:none;display:inline-flex;align-items:center;gap:4px;cursor:pointer;font-size:14px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;padding:0;white-space:nowrap;transition:color 0.15s; }
    .sort-btn:hover { color:#94a3b8; }
    .sort-btn.active { color:#00e5ff; }
    .pill { display:inline-flex;align-items:center;justify-content:center;min-width:28px;padding:2px 7px;border-radius:6px;font-size:13px;font-weight:700; }
    .pill-c { background:rgba(239,68,68,0.12);color:#ef4444;border:1px solid rgba(239,68,68,0.2); }
    .pill-h { background:rgba(245,158,11,0.12);color:#f59e0b;border:1px solid rgba(245,158,11,0.2); }
    .pill-m { background:rgba(249,115,22,0.12);color:#f97316;border:1px solid rgba(249,115,22,0.2); }
    .pill-l { background:rgba(59,130,246,0.12);color:#3b82f6;border:1px solid rgba(59,130,246,0.2); }
  </style>
</head>
<body style="font-family:var(--font-body,'Fira Sans',system-ui,sans-serif);background:var(--bg-page,#0a0e1a);color:var(--text-primary,#f1f5f9);margin:0;padding:0;min-height:100vh;">

  <!-- Sidebar -->
  <div id="sidebar-mount"></div>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/header.js"></script>

  <!-- Main -->
  <div id="main-content" style="margin-left:260px;min-height:100vh;">
    <header style="background:rgba(3,4,12,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,229,255,0.1);box-shadow:0 1px 0 rgba(0,229,255,0.08),0 4px 24px rgba(0,0,0,0.7);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;">
      <div>
        <h1 style="font-size:19px;font-weight:700;color:#f1f5f9;margin:0;font-family:'Fira Code',monospace;">Applications</h1>
        <p style="font-size:13px;color:#475569;margin:2px 0 0;font-family:'Fira Code',monospace;">// application.portfolio · security</p>
      </div>
      <div id="header-user-slot" style="display:flex;align-items:center;gap:12px;">
        <!-- Search -->
        <div style="position:relative;">
          <i data-lucide="search" style="width:16px;height:16px;color:#475569;position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;"></i>
          <input type="text" id="search-input" class="dark-input" placeholder="Search applications..." style="padding-left:34px;width:220px;" oninput="applyFilters()">
        </div>
        <!-- Team Filter -->
        <select id="team-filter" class="dark-select" onchange="applyFilters()">
          <option value="">All Teams</option>
        </select>
        <!-- Risk Filter -->
        <select id="risk-filter" class="dark-select" onchange="applyFilters()">
          <option value="">All Risk Levels</option>
          <option value="critical">Critical</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <button class="btn-primary" onclick="openAddModal()">
          <i data-lucide="plus" style="width:16px;height:16px;"></i> Add Application
        </button>
      </div>
    </header>

    <main style="padding:32px;">
      <div id="apps-count" style="font-size:15px;color:#475569;margin-bottom:16px;">Loading applications...</div>

      <!-- Table -->
      <div class="card" style="overflow:hidden;">
        <div style="overflow-x:auto;">
          <table style="width:100%;border-collapse:collapse;">
            <thead>
              <tr style="border-bottom:1px solid rgba(0,229,255,0.1);">
                <th style="padding:12px 16px;text-align:left;">
                  <button class="sort-btn" id="sort-name" onclick="setSort('name')">
                    Name <i data-lucide="chevrons-up-down" style="width:14px;height:14px;"></i>
                  </button>
                </th>
                <th style="padding:12px 16px;text-align:left;">
                  <button class="sort-btn" id="sort-team_name" onclick="setSort('team_name')">
                    Team <i data-lucide="chevrons-up-down" style="width:14px;height:14px;"></i>
                  </button>
                </th>
                <th style="padding:12px 16px;text-align:left;">
                  <button class="sort-btn active" id="sort-risk_score" onclick="setSort('risk_score')">
                    Risk Score <i data-lucide="chevron-down" style="width:14px;height:14px;"></i>
                  </button>
                </th>
                <th style="padding:12px 16px;text-align:center;">
                  <button class="sort-btn" id="sort-critical_count" onclick="setSort('critical_count')" title="Critical findings">
                    C <i data-lucide="chevrons-up-down" style="width:14px;height:14px;"></i>
                  </button>
                </th>
                <th style="padding:12px 16px;text-align:center;">
                  <button class="sort-btn" id="sort-high_count" onclick="setSort('high_count')" title="High findings">
                    H <i data-lucide="chevrons-up-down" style="width:14px;height:14px;"></i>
                  </button>
                </th>
                <th style="padding:12px 16px;text-align:center;">
                  <button class="sort-btn" id="sort-medium_count" onclick="setSort('medium_count')" title="Medium findings">
                    M <i data-lucide="chevrons-up-down" style="width:14px;height:14px;"></i>
                  </button>
                </th>
                <th style="padding:12px 16px;text-align:center;">
                  <button class="sort-btn" id="sort-low_count" onclick="setSort('low_count')" title="Low findings">
                    L <i data-lucide="chevrons-up-down" style="width:14px;height:14px;"></i>
                  </button>
                </th>
                <th style="padding:12px 16px;text-align:left;">
                  <button class="sort-btn" id="sort-language" onclick="setSort('language')">
                    Language <i data-lucide="chevrons-up-down" style="width:14px;height:14px;"></i>
                  </button>
                </th>
                <th style="padding:12px 16px;text-align:left;">
                  <button class="sort-btn" id="sort-last_scan_at" onclick="setSort('last_scan_at')">
                    Last Scan <i data-lucide="chevrons-up-down" style="width:14px;height:14px;"></i>
                  </button>
                </th>
                <th style="padding:12px 16px;text-align:center;font-size:14px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;">Actions</th>
              </tr>
            </thead>
            <tbody id="apps-tbody">
              <!-- Skeleton rows -->
              <tr><td colspan="10" style="padding:0;">
                <div style="padding:14px 16px;animation:pulse 1.5s infinite;border-bottom:1px solid rgba(0,229,255,0.06);display:flex;gap:16px;align-items:center;">
                  <div style="height:14px;background:rgba(255,255,255,0.06);border-radius:4px;flex:1;max-width:160px;"></div>
                  <div style="height:12px;background:rgba(255,255,255,0.04);border-radius:4px;width:80px;"></div>
                  <div style="height:22px;background:rgba(255,255,255,0.06);border-radius:6px;width:90px;"></div>
                </div>
              </td></tr>
              <tr><td colspan="10" style="padding:0;">
                <div style="padding:14px 16px;animation:pulse 1.5s infinite;border-bottom:1px solid rgba(0,229,255,0.06);display:flex;gap:16px;align-items:center;">
                  <div style="height:14px;background:rgba(255,255,255,0.06);border-radius:4px;flex:1;max-width:200px;"></div>
                  <div style="height:12px;background:rgba(255,255,255,0.04);border-radius:4px;width:100px;"></div>
                  <div style="height:22px;background:rgba(255,255,255,0.06);border-radius:6px;width:80px;"></div>
                </div>
              </td></tr>
              <tr><td colspan="10" style="padding:0;">
                <div style="padding:14px 16px;animation:pulse 1.5s infinite;display:flex;gap:16px;align-items:center;">
                  <div style="height:14px;background:rgba(255,255,255,0.06);border-radius:4px;flex:1;max-width:140px;"></div>
                  <div style="height:12px;background:rgba(255,255,255,0.04);border-radius:4px;width:90px;"></div>
                  <div style="height:22px;background:rgba(255,255,255,0.06);border-radius:6px;width:100px;"></div>
                </div>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add Application Modal -->
  <div id="add-modal" class="modal-backdrop" style="display:none;" onclick="handleBackdropClick(event,'add-modal')">
    <div style="background:#0d1117;border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:32px;width:100%;max-width:500px;position:relative;animation:fadeInUp 0.3s ease;" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
        <div>
          <h2 style="font-size:20px;font-weight:700;color:#f1f5f9;margin:0;">Add Application</h2>
          <p style="font-size:15px;color:#475569;margin:4px 0 0;">Register a new application for security scanning</p>
        </div>
        <button onclick="closeAddModal()" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#94a3b8;cursor:pointer;padding:8px;display:flex;align-items:center;justify-content:center;">
          <i data-lucide="x" style="width:18px;height:18px;"></i>
        </button>
      </div>
      <form id="add-form" onsubmit="submitAddApp(event)">
        <div style="margin-bottom:16px;">
          <label style="font-size:15px;color:#94a3b8;font-weight:500;display:block;margin-bottom:6px;">Application Name <span style="color:#ef4444;">*</span></label>
          <input type="text" id="field-name" class="dark-input" style="width:100%;" placeholder="e.g. payment-service" required>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
          <div>
            <label style="font-size:15px;color:#94a3b8;font-weight:500;display:block;margin-bottom:6px;">GitHub Org</label>
            <input type="text" id="field-github-org" class="dark-input" style="width:100%;" placeholder="e.g. myorg">
          </div>
          <div>
            <label style="font-size:15px;color:#94a3b8;font-weight:500;display:block;margin-bottom:6px;">GitHub Repo</label>
            <input type="text" id="field-github-repo" class="dark-input" style="width:100%;" placeholder="e.g. payment-service">
          </div>
        </div>
        <div style="margin-bottom:16px;">
          <label style="font-size:15px;color:#94a3b8;font-weight:500;display:block;margin-bottom:6px;">Team Name</label>
          <input type="text" id="field-team" class="dark-input" style="width:100%;" placeholder="e.g. Platform Engineering">
        </div>
        <div style="margin-bottom:16px;">
          <label style="font-size:15px;color:#94a3b8;font-weight:500;display:block;margin-bottom:6px;">Language</label>
          <select id="field-language" class="dark-select" style="width:100%;">
            <option value="">Select language...</option>
            <option>Python</option><option>JavaScript</option><option>TypeScript</option>
            <option>Go</option><option>Java</option><option>Kotlin</option><option>Ruby</option>
            <option>PHP</option><option>C#</option><option>C++</option><option>Rust</option>
          </select>
        </div>
        <div style="margin-bottom:24px;">
          <label style="font-size:15px;color:#94a3b8;font-weight:500;display:block;margin-bottom:6px;">Description</label>
          <textarea id="field-description" class="dark-input" style="width:100%;min-height:80px;resize:vertical;" placeholder="Brief description of this application..."></textarea>
        </div>
        <div style="margin-bottom:24px;">
          <label style="font-size:15px;color:#94a3b8;font-weight:500;display:block;margin-bottom:6px;">Container Image <span style="color:#475569;font-weight:400;">(optional — for Grype container scans)</span></label>
          <input type="text" id="field-container-image" class="dark-input" style="width:100%;" placeholder="e.g. nginx:latest or ghcr.io/org/app:sha">
        </div>
        <div style="display:flex;gap:12px;justify-content:flex-end;">
          <button type="button" class="btn-secondary" onclick="closeAddModal()">Cancel</button>
          <button type="submit" class="btn-primary" id="add-submit-btn">
            <i data-lucide="plus" style="width:16px;height:16px;"></i> Add Application
          </button>
        </div>
      </form>
    </div>
  </div>

<script>
let allApps = [];
let sortColumn = 'risk_score';
let sortDir = 'desc';

// ── Utilities ──────────────────────────────────────────────────────────────────
function getRiskColor(score) {
  if (score >= 75) return '#ef4444';
  if (score >= 50) return '#f59e0b';
  if (score >= 25) return '#f97316';
  return '#10b981';
}

function getRiskLevel(score) {
  if (score >= 75) return {label:'Critical', color:'#ef4444', bg:'rgba(239,68,68,0.15)'};
  if (score >= 50) return {label:'High', color:'#f59e0b', bg:'rgba(245,158,11,0.15)'};
  if (score >= 25) return {label:'Medium', color:'#f97316', bg:'rgba(249,115,22,0.15)'};
  return {label:'Low', color:'#10b981', bg:'rgba(16,185,129,0.15)'};
}

function timeAgo(dateStr) {
  if (!dateStr) return 'Never';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return 'Never';
  const diff = Math.floor((Date.now() - d) / 1000);
  if (diff < 0) return 'Just now';
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function showToast(message, type='success') {
  const colors = {success:'#10b981', error:'#ef4444', warning:'#f59e0b', info:'#00e5ff'};
  const icons = {success:'check-circle', error:'alert-circle', warning:'alert-triangle', info:'info'};
  const toast = document.createElement('div');
  toast.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:9999;background:rgba(13,17,23,0.95);border:1px solid ${colors[type]}44;border-left:3px solid ${colors[type]};padding:14px 18px;border-radius:10px;display:flex;align-items:center;gap:10px;color:#f1f5f9;font-size:16px;font-weight:500;backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:slideInRight 0.3s ease;`;
  const _icon = document.createElement('i');
  _icon.setAttribute('data-lucide', icons[type]);
  _icon.style.cssText = `width:18px;height:18px;color:${colors[type]};flex-shrink:0;`;
  const _msg = document.createElement('span');
  _msg.textContent = message;
  toast.appendChild(_icon);
  toast.appendChild(_msg);
  document.body.appendChild(toast);
  lucide.createIcons();
  setTimeout(() => { toast.style.animation='slideOutRight 0.3s ease forwards'; setTimeout(()=>toast.remove(),300); }, 3500);
}

// ── Sorting ────────────────────────────────────────────────────────────────────
function setSort(col) {
  if (sortColumn === col) {
    sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  } else {
    sortColumn = col;
    sortDir = 'desc';
  }
  updateSortHeaders();
  applyFilters();
}

function updateSortHeaders() {
  const cols = ['name','team_name','risk_score','critical_count','high_count','medium_count','low_count','language','last_scan_at'];
  cols.forEach(col => {
    const btn = document.getElementById('sort-' + col);
    if (!btn) return;
    const isActive = col === sortColumn;
    btn.classList.toggle('active', isActive);
    const icon = btn.querySelector('i[data-lucide]');
    if (icon) {
      if (isActive) {
        icon.setAttribute('data-lucide', sortDir === 'desc' ? 'chevron-down' : 'chevron-up');
      } else {
        icon.setAttribute('data-lucide', 'chevrons-up-down');
      }
    }
  });
  lucide.createIcons();
}

function sortApps(apps) {
  return [...apps].sort((a, b) => {
    let va = a[sortColumn] ?? (typeof a[sortColumn] === 'number' ? -1 : '');
    let vb = b[sortColumn] ?? (typeof b[sortColumn] === 'number' ? -1 : '');

    // Map API field names to actual finding count fields
    if (sortColumn === 'critical_count') { va = (a.findings_summary?.critical ?? a.critical_count ?? 0); vb = (b.findings_summary?.critical ?? b.critical_count ?? 0); }
    if (sortColumn === 'high_count')     { va = (a.findings_summary?.high ?? a.high_count ?? 0);         vb = (b.findings_summary?.high ?? b.high_count ?? 0); }
    if (sortColumn === 'medium_count')   { va = (a.findings_summary?.medium ?? a.medium_count ?? 0);     vb = (b.findings_summary?.medium ?? b.medium_count ?? 0); }
    if (sortColumn === 'low_count')      { va = (a.findings_summary?.low ?? a.low_count ?? 0);           vb = (b.findings_summary?.low ?? b.low_count ?? 0); }
    if (sortColumn === 'last_scan_at')   { va = va ? new Date(va).getTime() : 0; vb = vb ? new Date(vb).getTime() : 0; }

    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();

    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });
}

// ── App Row ────────────────────────────────────────────────────────────────────
function appRow(app) {
  const score = app.risk_score || 0;
  const risk  = getRiskLevel(score);
  const fs    = app.findings_summary || {};
  const c = fs.critical ?? app.critical_count ?? 0;
  const h = fs.high     ?? app.high_count     ?? 0;
  const m = fs.medium   ?? app.medium_count   ?? 0;
  const l = fs.low      ?? app.low_count      ?? 0;
  const langColors = { Python:'#3b82f6', JavaScript:'#f59e0b', TypeScript:'#6366f1', Go:'#00e5ff', Java:'#f97316', Kotlin:'#a78bfa', Ruby:'#ef4444', PHP:'#8b5cf6', 'C#':'#10b981', 'C++':'#94a3b8', Rust:'#f97316' };
  const langColor = langColors[app.language] || '#475569';

  return `
    <tr class="app-row" onclick="location.href='/app-detail.html?id=${app.id}'" style="border-bottom:1px solid rgba(0,229,255,0.06);">
      <td style="padding:14px 16px;">
        <div style="font-size:16px;font-weight:600;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;">${app.name || '—'}</div>
        ${app.github_org ? `<div style="font-size:13px;color:#475569;margin-top:1px;">${app.github_org}/${app.github_repo||''}</div>` : ''}
      </td>
      <td style="padding:14px 16px;">
        <span style="background:rgba(0,229,255,0.08);color:#00e5ff;border:1px solid rgba(0,229,255,0.15);padding:2px 8px;border-radius:6px;font-size:13px;font-weight:500;white-space:nowrap;">${app.team_name || '—'}</span>
      </td>
      <td style="padding:14px 16px;white-space:nowrap;">
        <span style="background:${risk.bg};color:${risk.color};border:1px solid ${risk.color}33;padding:3px 10px;border-radius:8px;font-size:14px;font-weight:700;">
          ${score} &nbsp;${risk.label}
        </span>
      </td>
      <td style="padding:14px 8px;text-align:center;"><span class="pill pill-c">${c}</span></td>
      <td style="padding:14px 8px;text-align:center;"><span class="pill pill-h">${h}</span></td>
      <td style="padding:14px 8px;text-align:center;"><span class="pill pill-m">${m}</span></td>
      <td style="padding:14px 8px;text-align:center;"><span class="pill pill-l">${l}</span></td>
      <td style="padding:14px 16px;">
        ${app.language ? `<span style="background:${langColor}22;color:${langColor};border:1px solid ${langColor}33;padding:2px 8px;border-radius:6px;font-size:13px;font-weight:500;">${app.language}</span>` : '<span style="color:#475569;font-size:14px;">—</span>'}
      </td>
      <td style="padding:14px 16px;font-size:14px;color:#475569;white-space:nowrap;">${timeAgo(app.last_scan_at)}</td>
      <td style="padding:14px 16px;text-align:center;white-space:nowrap;" onclick="event.stopPropagation()">
        <button onclick="location.href='/app-detail.html?id=${app.id}'" class="btn-secondary" style="padding:6px 10px;font-size:14px;margin-right:4px;" title="View details">
          <i data-lucide="eye" style="width:14px;height:14px;"></i>
        </button>
        <button onclick="runScan(event,'${app.id}','${app.name||'app'}')" id="scan-btn-${app.id}" class="btn-secondary" style="padding:6px 10px;font-size:14px;margin-right:4px;" title="Run scan">
          <i data-lucide="play" style="width:14px;height:14px;color:#00e5ff;"></i>
        </button>
        <button onclick="deleteApp(event,'${app.id}',${JSON.stringify(app.name||'app').replace(/"/g,'&quot;')})" class="btn-secondary" style="padding:6px 10px;font-size:14px;" title="Remove application">
          <i data-lucide="trash-2" style="width:14px;height:14px;color:#ef4444;"></i>
        </button>
      </td>
    </tr>
  `;
}

// ── Run Scan ───────────────────────────────────────────────────────────────────
async function runScan(e, id, name) {
  e.stopPropagation();
  const btn = document.getElementById(`scan-btn-${id}`);
  if (!btn) return;
  btn.disabled = true;
  btn.innerHTML = '<div style="animation:spin 1s linear infinite;width:14px;height:14px;border:2px solid rgba(255,255,255,0.2);border-top-color:#00e5ff;border-radius:50%;"></div>';
  try {
    const res = await fetch(`/api/v1/applications/${id}/scan?scan_type=all`, { method:'POST' });
    if (!res.ok) throw new Error('Scan request failed');
    showToast(`Scan started for ${name}`, 'success');
  } catch(err) {
    showToast(`Failed to start scan: ${err.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i data-lucide="play" style="width:14px;height:14px;color:#00e5ff;"></i>';
    lucide.createIcons();
  }
}

// ── Delete Application ─────────────────────────────────────────────────────────
async function deleteApp(e, id, name) {
  e.stopPropagation();
  if (!confirm(`Remove "${name}" and all its scans and findings? This cannot be undone.`)) return;
  try {
    const res = await fetch(`/api/v1/applications/${id}`, { method: 'DELETE' });
    if (!res.ok && res.status !== 204) throw new Error(`Server returned ${res.status}`);
    allApps = allApps.filter(a => a.id !== id);
    applyFilters();
    showToast(`"${name}" removed`, 'success');
  } catch(err) {
    showToast(`Failed to remove application: ${err.message}`, 'error');
  }
}

// ── Filters ────────────────────────────────────────────────────────────────────
function applyFilters() {
  const search    = document.getElementById('search-input').value.toLowerCase();
  const team      = document.getElementById('team-filter').value;
  const riskFilter = document.getElementById('risk-filter').value;

  const filtered = allApps.filter(app => {
    const nameMatch = !search || (app.name||'').toLowerCase().includes(search);
    const teamMatch = !team   || app.team_name === team;
    const riskMatch = !riskFilter || getRiskLevel(app.risk_score||0).label.toLowerCase() === riskFilter;
    return nameMatch && teamMatch && riskMatch;
  });

  renderList(filtered);
}

function populateTeamFilter(apps) {
  const teams = [...new Set(apps.map(a => a.team_name).filter(Boolean))].sort();
  const sel   = document.getElementById('team-filter');
  const cur   = sel.value;
  sel.innerHTML = '<option value="">All Teams</option>' + teams.map(t => `<option value="${t}" ${t===cur?'selected':''}>${t}</option>`).join('');
}

function renderList(apps) {
  const tbody = document.getElementById('apps-tbody');
  const count = document.getElementById('apps-count');
  count.textContent = `Showing ${apps.length} of ${allApps.length} application${allApps.length !== 1 ? 's' : ''}`;

  if (apps.length === 0) {
    tbody.innerHTML = `
      <tr><td colspan="10" style="text-align:center;padding:80px 20px;">
        <i data-lucide="inbox" style="width:48px;height:48px;color:#475569;margin:0 auto 16px;display:block;"></i>
        <div style="font-size:19px;font-weight:600;color:#f1f5f9;margin-bottom:8px;">No applications found</div>
        <p style="color:#475569;margin-bottom:24px;">Try adjusting your filters or add your first application.</p>
        <button class="btn-primary" onclick="openAddModal()"><i data-lucide="plus" style="width:16px;height:16px;"></i> Add your first application</button>
      </td></tr>`;
    lucide.createIcons();
    return;
  }

  tbody.innerHTML = sortApps(apps).map(appRow).join('');
  lucide.createIcons();
}

// ── Modal ──────────────────────────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('add-form').reset();
  document.getElementById('add-modal').style.display = 'flex';
  lucide.createIcons();
}

function closeAddModal() {
  document.getElementById('add-modal').style.display = 'none';
}

function handleBackdropClick(e, id) {
  if (e.target.id === id) document.getElementById(id).style.display = 'none';
}

async function submitAddApp(e) {
  e.preventDefault();
  const btn = document.getElementById('add-submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<div style="animation:spin 1s linear infinite;display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;"></div> Adding...';

  const payload = {
    name:            document.getElementById('field-name').value.trim(),
    github_org:      document.getElementById('field-github-org').value.trim()     || undefined,
    github_repo:     document.getElementById('field-github-repo').value.trim()    || undefined,
    team_name:       document.getElementById('field-team').value.trim()           || undefined,
    language:        document.getElementById('field-language').value              || undefined,
    description:     document.getElementById('field-description').value.trim()    || undefined,
    container_image: document.getElementById('field-container-image').value.trim() || undefined,
  };

  try {
    const res = await fetch('/api/v1/applications', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || err.message || 'Failed to create application');
    }
    closeAddModal();
    showToast(`Application "${payload.name}" added successfully!`, 'success');
    await loadApplications();
  } catch(err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i data-lucide="plus" style="width:16px;height:16px;"></i> Add Application';
    lucide.createIcons();
  }
}

// ── Load ───────────────────────────────────────────────────────────────────────
async function loadApplications() {
  try {
    const res = await fetch('/api/v1/applications?page=1&page_size=50');
    if (!res.ok) throw new Error('Failed to load applications');
    const data = await res.json();
    allApps = data.items || [];
    populateTeamFilter(allApps);
    applyFilters();
  } catch(e) {
    allApps = [];
    const tbody = document.getElementById('apps-tbody');
    tbody.innerHTML = `
      <tr><td colspan="10" style="text-align:center;padding:80px 20px;">
        <i data-lucide="wifi-off" style="width:48px;height:48px;color:#ef4444;margin:0 auto 16px;display:block;opacity:0.5;"></i>
        <div style="font-size:19px;font-weight:600;color:#f1f5f9;margin-bottom:8px;">Failed to load applications</div>
        <p style="color:#475569;margin-bottom:24px;">${e.message || 'An error occurred'}</p>
        <button class="btn-secondary" onclick="loadApplications()"><i data-lucide="refresh-cw" style="width:16px;height:16px;"></i> Retry</button>
      </td></tr>`;
    lucide.createIcons();
    showToast('Failed to load applications', 'error');
  }
}

// ── Keyboard & Init ────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeAddModal(); }
});

document.addEventListener('DOMContentLoaded', () => {
  applyTheme(localStorage.getItem('theme')||'dark');
  updateSortHeaders();
  lucide.createIcons();
  loadApplications();
});
</script>
</body>
</html>
