<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snitch — Security Overview</title>
  <script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'dark');})();</script>
  <link rel="stylesheet" href="/static/css/theme.css">
  <script src="/static/js/chart.min.js"></script>
  <script src="/static/js/lucide.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes slideInRight  { from{transform:translateX(100px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes slideOutRight { from{transform:translateX(0);opacity:1} to{transform:translateX(100px);opacity:0} }
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:0.35} }
    @keyframes fadeInUp { from{transform:translateY(18px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    @keyframes liveDot  { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

    body { font-family: var(--font-body, 'Fira Sans', system-ui, sans-serif); min-height:100vh; }

    /* Cards pop against the near-black page */
    .card {
      background: linear-gradient(145deg, #0f1b34 0%, #080f1d 100%);
      border: 1px solid rgba(0,229,255,0.14);
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.55), inset 0 1px 0 rgba(0,229,255,0.06);
    }
    .card-lift:hover {
      border-color: rgba(0,229,255,0.28);
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.55), 0 0 24px rgba(0,229,255,0.07);
      transition: all 0.25s;
    }

    .mono { font-family: var(--font-mono, 'Fira Code', monospace); }

    /* Large metric numbers */
    .big-num {
      font-family: var(--font-mono, 'Fira Code', monospace);
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -2px;
    }
    .med-num {
      font-family: var(--font-mono, 'Fira Code', monospace);
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    /* Section labels */
    .slabel {
      font-family: var(--font-mono, 'Fira Code', monospace);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #475569;
    }

    /* Thin cyan vertical divider */
    .vdiv {
      width: 1px;
      background: rgba(0,229,255,0.09);
      align-self: stretch;
      margin: 12px 0;
      flex-shrink: 0;
    }

    /* ── Threat Strip ── */
    #threat-strip {
      display: flex;
      align-items: stretch;
      overflow: hidden;
      margin-bottom: 24px;
      animation: fadeInUp 0.4s ease;
      min-height: 116px;
    }
    #threat-level-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 28px;
      min-width: 160px;
      border-radius: 15px 0 0 15px;
      transition: background 0.5s;
      gap: 8px;
      flex-shrink: 0;
    }
    .threat-metrics {
      display: flex;
      flex: 1;
      align-items: center;
    }
    .metric-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 12px;
      text-align: center;
      gap: 6px;
      text-decoration: none;
      transition: background 0.2s;
    }
    a.metric-block:hover { background: rgba(0,229,255,0.05); }

    /* ── Risk Gauge SVG ── */
    .gauge-wrap {
      position: relative;
      width: 80px;
      height: 80px;
      flex-shrink: 0;
    }
    .gauge-wrap .gauge-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── App Risk Bars ── */
    .app-bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid rgba(0,229,255,0.05);
      cursor: pointer;
      transition: background 0.2s;
      border-radius: 6px;
    }
    .app-bar-row:last-child { border-bottom: none; }
    .app-bar-row:hover { background: rgba(0,229,255,0.04); }
    .risk-bar-track {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      overflow: hidden;
    }
    .risk-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 1s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── Finding Cards ── */
    .finding-card {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .finding-card:hover {
      background: rgba(0,229,255,0.05);
      border-color: rgba(0,229,255,0.15);
    }
    .sev-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }

    /* Skeleton pulse */
    .skel {
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      animation: pulse 1.8s ease-in-out infinite;
    }

    .table-row:hover { background: rgba(0,229,255,0.04) !important; }
  </style>
</head>
<body style="margin:0;padding:0;min-height:100vh;">

  <div id="sidebar-mount"></div>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/header.js"></script>

  <div id="main-content" style="margin-left:260px;min-height:100vh;">

    <!-- Header -->
    <header style="background:rgba(3,4,12,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,229,255,0.1);box-shadow:0 1px 0 rgba(0,229,255,0.08),0 4px 24px rgba(0,0,0,0.7);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;">
      <div>
        <h1 class="mono" style="font-size:19px;font-weight:700;color:#f1f5f9;">Security Overview</h1>
        <p class="mono" style="font-size:13px;color:#475569;margin-top:2px;">// platform.monitor · live</p>
      </div>
      <div id="header-user-slot" style="display:flex;align-items:center;gap:8px;"></div>
    </header>

    <main style="padding:28px 32px;">

      <!-- ── Threat Intelligence Strip ── -->
      <div id="threat-strip" class="card">

        <!-- Status panel (dynamic colour) -->
        <div id="threat-level-panel">
          <div class="slabel" style="color:rgba(255,255,255,0.55);">Threat Level</div>
          <div id="threat-level-word" class="mono" style="font-size:19px;font-weight:700;color:#f1f5f9;letter-spacing:2px;">———</div>

        <div class="threat-metrics">

          <!-- High -->

            <div class="slabel" style="color:rgba(255,159,67,0.7);">High</div>
          </a>

          <div class="vdiv"></div>

          <!-- Open Findings -->
          <a href="/findings.html" class="metric-block">
            <div class="big-num" id="m-open" style="color:#f1f5f9;">0</div>
            <div class="slabel">Open Findings</div>

          <div class="vdiv"></div>

          <!-- Apps -->
          <div class="metric-block">

                <!-- Track: 270° arc, starts bottom-left, ends bottom-right -->
                <circle cx="40" cy="40" r="30" fill="none"

        <!-- Threat Distribution Donut -->

<script>
// ── Utilities ────────────────────────────────────────────────────────────────
function animateCounter(el, target, duration) {
  if (!el) return;
  duration = duration || 1200;
  const start = performance.now();
  (function tick(now) {
    const p = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.floor(target * eased).toLocaleString();
    if (p < 1) requestAnimationFrame(tick);
  })(start);
}

function getRiskColor(score) {
  if (score >= 75) return '#ff3333';
  if (score >= 50) return '#ff9f43';
  if (score >= 25) return '#ff6b35';
  return '#00c853';
}

function getRiskLevel(score) {
  if (score >= 75) return {label:'Critical', color:'#ff3333', bg:'rgba(255,51,51,0.15)'};
  if (score >= 50) return {label:'High',     color:'#ff9f43', bg:'rgba(255,159,67,0.15)'};
  if (score >= 25) return {label:'Medium',   color:'#ff6b35', bg:'rgba(255,107,53,0.13)'};
  return               {label:'Low',      color:'#00c853', bg:'rgba(0,200,83,0.13)'};
}

function severityBadge(sev) {
  const map = {
    critical:{color:'#ff3333',bg:'rgba(255,51,51,0.15)',border:'rgba(255,51,51,0.4)',label:'CRIT'},
    high:    {color:'#ff9f43',bg:'rgba(255,159,67,0.15)',border:'rgba(255,159,67,0.4)',label:'HIGH'},
    medium:  {color:'#ff6b35',bg:'rgba(255,107,53,0.13)',border:'rgba(255,107,53,0.4)',label:'MED'},
    low:     {color:'#54a0ff',bg:'rgba(84,160,255,0.13)',border:'rgba(84,160,255,0.4)',label:'LOW'},
    info:    {color:'#a29bfe',bg:'rgba(162,155,254,0.13)',border:'rgba(162,155,254,0.4)',label:'INFO'},
  };
  const s = map[(sev||'').toLowerCase()] || map.info;
  return `<span style="background:${s.bg};color:${s.color};border:1px solid ${s.border};padding:3px 7px;border-radius:5px;font-size:12px;font-weight:700;font-family:'Fira Code',monospace;letter-spacing:0.5px;white-space:nowrap;">${s.label}</span>`;
}

function severityDot(sev) {
  const cols = {critical:'#ff3333',high:'#ff9f43',medium:'#ff6b35',low:'#54a0ff',info:'#a29bfe'};
  return cols[(sev||'').toLowerCase()] || '#a29bfe';
}

function timeAgo(dateStr) {
  if (!dateStr) return 'Never';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return 'Never';
  const diff = Math.floor((Date.now() - d) / 1000);
  if (diff < 0) return 'Just now';
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function showToast(message, type) {
  type = type || 'success';
  const colors = {success:'#00c853',error:'#ff3333',warning:'#ff9f43',info:'#00e5ff'};
  const icons  = {success:'check-circle',error:'alert-circle',warning:'alert-triangle',info:'info'};
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;background:rgba(8,12,24,0.97);border:1px solid '+colors[type]+'44;border-left:3px solid '+colors[type]+';padding:14px 18px;border-radius:10px;display:flex;align-items:center;gap:10px;color:#f1f5f9;font-size:16px;font-weight:500;backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,0.6);animation:slideInRight 0.3s ease;';
  const ico = document.createElement('i'); ico.setAttribute('data-lucide',icons[type]); ico.style.cssText='width:18px;height:18px;color:'+colors[type]+';flex-shrink:0;';
  const msg = document.createElement('span'); msg.textContent = message;
  t.appendChild(ico); t.appendChild(msg);
  document.body.appendChild(t); lucide.createIcons();
  setTimeout(function(){ t.style.animation='slideOutRight 0.3s ease forwards'; setTimeout(function(){t.remove();},300); }, 3500);
}

function escapeHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
                    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
                    .replace(/'/g,'&#39;');
}

// ── Threat Strip ─────────────────────────────────────────────────────────────
function renderThreatStrip(d) {
  const avg      = Math.round(d.avg_risk_score || 0);
  const critical = d.critical_findings || 0;
  const high     = d.high_findings     || 0;
  const open     = d.open_findings     || 0;
  const apps     = d.total_apps        || 0;

  // Determine threat level
  var level, levelColor, panelBg;
  if (avg >= 75 || critical > 10) {
    level = 'CRITICAL'; levelColor = '#ff3333';
    panelBg = 'linear-gradient(150deg,rgba(255,51,51,0.22),rgba(255,51,51,0.08))';
  } else if (avg >= 50 || critical > 0) {
    level = 'ELEVATED'; levelColor = '#ff9f43';
    panelBg = 'linear-gradient(150deg,rgba(255,159,67,0.22),rgba(255,159,67,0.08))';
  } else if (avg >= 25) {
    level = 'MODERATE'; levelColor = '#ff6b35';
    panelBg = 'linear-gradient(150deg,rgba(255,107,53,0.18),rgba(255,107,53,0.06))';
  } else {
    level = 'SECURE'; levelColor = '#00c853';
    panelBg = 'linear-gradient(150deg,rgba(0,200,83,0.18),rgba(0,200,83,0.06))';
  }

  var panel = document.getElementById('threat-level-panel');
  panel.style.background = panelBg;
  var word = document.getElementById('threat-level-word');
  word.textContent = level;
  word.style.color = levelColor;

  animateCounter(document.getElementById('m-critical'), critical);
  animateCounter(document.getElementById('m-high'),     high);
  animateCounter(document.getElementById('m-open'),     open);
  animateCounter(document.getElementById('m-apps'),     apps);
  animateCounter(document.getElementById('m-risk'),     avg);

  // Gauge arc: 270° track = 141.4 out of 188.5 circumference
  var arc = document.getElementById('gauge-arc');
  var fill = 141.4 * (avg / 100);
  arc.style.strokeDasharray = fill + ' 188.5';
  arc.style.stroke = levelColor;
  document.getElementById('m-risk').style.color = levelColor;
}

// ── Severity Donut ────────────────────────────────────────────────────────────
var severityChartInst;
function renderSeverityChart(sev) {
  if (severityChartInst) severityChartInst.destroy();
  var labels = ['Critical','High','Medium','Low','Info'];
  var values = [sev.critical||0, sev.high||0, sev.medium||0, sev.low||0, sev.info||0];
  var colors = ['#ff3333','#ff9f43','#ff6b35','#54a0ff','#a29bfe'];
  var total  = values.reduce(function(a,b){return a+b;},0);
  document.getElementById('total-findings-center').textContent = total.toLocaleString();

  var ctx = document.getElementById('severityChart').getContext('2d');
  severityChartInst = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: labels,
      datasets: [{
        data: values,
        backgroundColor: colors.map(function(c){return c+'bb';}),
        borderColor: colors,
        borderWidth: 2,
        hoverOffset: 6
      }]
    },
    options: {
      cutout: '74%',
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: {display:false},
        tooltip: { callbacks: { label: function(ctx){ return ' '+ctx.label+': '+ctx.raw.toLocaleString(); } } }
      },
      animation: {animateRotate:true, duration:900}
    }
  });

  // Legend: label + mini bar showing proportion
  var legend = document.getElementById('severity-legend');
  legend.innerHTML = labels.map(function(l,i){
    var pct = total > 0 ? Math.round(values[i]/total*100) : 0;
    return '<div style="display:flex;align-items:center;gap:8px;">'
      + '<div style="width:10px;height:10px;border-radius:3px;background:'+colors[i]+';flex-shrink:0;"></div>'
      + '<div style="flex:1;min-width:0;">'
      + '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;">'
      + '<span style="font-size:14px;color:#94a3b8;">'+l+'</span>'
      + '<span style="font-size:15px;font-weight:700;color:#f1f5f9;font-family:\'Fira Code\',monospace;">'+values[i].toLocaleString()+'</span>'
      + '</div>'
      + '<div style="height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;">'
      + '<div style="height:100%;width:'+pct+'%;background:'+colors[i]+';border-radius:2px;transition:width 1s ease;"></div>'
      + '</div>'
      + '</div>'
      + '</div>';
  }).join('');
}

// ── App Risk Bars ─────────────────────────────────────────────────────────────
function renderAppRiskList(items) {
  var el = document.getElementById('app-risk-list');
  if (!items || !items.length) {
    el.innerHTML = '<div style="padding:32px;text-align:center;color:#475569;font-size:16px;">No applications found</div>';
    return;
  }
  var sorted = items.slice().sort(function(a,b){return (b.risk_score||0)-(a.risk_score||0);}).slice(0,8);

  el.innerHTML = sorted.map(function(app, idx){
    var score = app.risk_score || 0;
    var risk  = getRiskLevel(score);
    var barW  = Math.round((score / 100) * 100);
    return '<div class="app-bar-row" onclick="location.href=\'/app-detail.html?id='+app.id+'\'">'
      + '<div style="width:20px;text-align:center;font-family:\'Fira Code\',monospace;font-size:13px;font-weight:600;color:#475569;flex-shrink:0;">#'+(idx+1)+'</div>'
      + '<div style="flex:0 0 140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:15px;font-weight:600;color:#e2e8f0;">'+escapeHtml(app.name||'—')+'</div>'
      + '<div class="risk-bar-track">'
      + '<div class="risk-bar-fill" style="width:'+barW+'%;background:'+risk.color+';box-shadow:0 0 6px '+risk.color+'66;"></div>'
      + '</div>'
      + '<div style="width:60px;text-align:right;flex-shrink:0;">'
      + '<span style="font-family:\'Fira Code\',monospace;font-size:15px;font-weight:700;color:'+risk.color+';">'+score+'</span>'
      + '<span style="font-size:12px;color:#475569;">/100</span>'
      + '</div>'
      + '</div>';
  }).join('');
}

// ── Top Vulnerabilities List ──────────────────────────────────────────────────
function renderTopVulns(items) {
  var el = document.getElementById('top-vuln-list');
  if (!items || !items.length) {
    el.innerHTML = '<div style="padding:32px;text-align:center;color:#475569;font-size:16px;"><i data-lucide="shield-check" style="width:28px;height:28px;display:block;margin:0 auto 8px;opacity:0.3;"></i>No vulnerabilities found</div>';
    lucide.createIcons();
    return;
  }
  el.innerHTML = items.map(function(v, idx){
    var dotColor = severityDot(v.severity);
    var title = escapeHtml((v.title||'Unknown vulnerability').slice(0,60)) + ((v.title||'').length > 60 ? '…' : '');
    var ident = v.identifier || v.cve_id || v.rule_id || '—';
    return '<div class="app-bar-row" style="padding:14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);">'
      + '<div style="width:20px;text-align:center;font-family:\'Fira Code\',monospace;font-size:13px;font-weight:600;color:#475569;flex-shrink:0;">#'+(idx+1)+'</div>'
      + '<div class="sev-dot" style="background:'+dotColor+';box-shadow:0 0 6px '+dotColor+'88;margin:0 10px 0 4px;"></div>'
      + '<div style="flex:1;min-width:0;">'
      + '<div style="font-size:15px;font-weight:600;color:#e2e8f0;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+title+'</div>'
      + '<div style="display:flex;align-items:center;gap:10px;font-size:13px;color:#94a3b8;font-family:\'Fira Code\',monospace;">'
      + '<span>'+ident+'</span>'
      + '<span style="color:rgba(255,255,255,0.2);">|</span>'
      + '<span>Occurrences: <strong style="color:#00e5ff;">'+(v.total_occurrences||0)+'</strong></span>'
      + '<span style="color:rgba(255,255,255,0.2);">|</span>'
      + '<span>Affected Apps: <strong style="color:#f1f5f9;">'+(v.affected_apps||0)+'</strong></span>'
      + '</div>'
      + '</div>'
      + '<div style="flex-shrink:0;">'
      + severityBadge(v.severity)
      + '</div>'
      + '</div>';
  }).join('');
}

async function renderThreatIntel() {
  var el = document.getElementById('threat-intel-list');
  el.innerHTML = '<div style="padding:20px;text-align:center;"><div style="animation:spin 1s linear infinite;display:inline-block;width:22px;height:22px;border:2px solid rgba(255,255,255,0.08);border-top-color:#00e5ff;border-radius:50%;"></div></div>';
  
  try {
    const res = await fetch('/api/v1/threat-intel/feed');
    if (!res.ok) throw new Error('Network error');
    const data = await res.json();
    
    // Take only the top 5
    const topItems = (data.items || []).slice(0, 5);
    
    if (topItems.length === 0) {
      el.innerHTML = '<div style="padding:20px;text-align:center;color:#475569;font-size:14px;">No intel available.</div>';
      return;
    }
    
    function timeAgo(dateStr) {
  if (!dateStr) return 'Never';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return 'Never';
  const diff = Math.floor((Date.now() - d) / 1000);
  if (diff < 0) return 'Just now';
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

    el.innerHTML = topItems.map(function(item) {
      // Pick a random icon/color based on source hash for visual variety
      const colors = ['#ff3333', '#ff9f43', '#00e5ff', '#ff6b35', '#a29bfe'];
      const icons = ['alert-triangle', 'cloud-lightning', 'alert-circle', 'server', 'shield-alert'];
      let hash = 0;
      for (let i = 0; i < item.source.length; i++) { hash = item.source.charCodeAt(i) + ((hash << 5) - hash); }
      const idx = Math.abs(hash) % colors.length;
      const color = colors[idx];
      const icon = icons[idx];

      return '<div class="app-bar-row" style="padding:14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);align-items:flex-start;">'
        + '<div style="margin-top:2px;color:'+color+';flex-shrink:0;">'
        + '<i data-lucide="'+icon+'" style="width:16px;height:16px;"></i>'
        + '</div>'
        + '<div style="flex:1;min-width:0;">'
        + '<div style="font-size:15px;font-weight:600;color:#e2e8f0;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+item.title+'</div>'
        + '<div style="display:flex;align-items:center;gap:10px;font-size:13px;color:#475569;font-family:\'Fira Code\',monospace;margin-top:6px;">'
        + '<span>SOURCE: <strong style="color:#00e5ff;">'+item.source+'</strong></span>'
        + '<span style="color:rgba(255,255,255,0.2);">|</span>'
        + '<span>'+timeAgo(item.pubDate)+'</span>'
        + '</div>'
        + '</div>'
        + '</div>';
    }).join('');
    lucide.createIcons();
  } catch(err) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:#ef4444;font-size:14px;">Failed to load feed.</div>';
  }
}

// ── Load Data ─────────────────────────────────────────────────────────────────
async function loadDashboard() {
  try {
    var [overviewRes, appsRes, findingsRes] = await Promise.all([
      fetch('/api/v1/reports/overview'),
      fetch('/api/v1/applications?page=1&page_size=10&sort_by=risk_score&sort_order=desc'),
      fetch('/api/v1/reports/top-vulnerabilities?limit=5'),
    ]);

    if (overviewRes.ok) {
      var d = await overviewRes.json();
      renderThreatStrip(d);
      var sev = d.findings_by_severity || {
        critical: d.critical_findings||0,
        high:     d.high_findings||0,
        medium:   d.medium_findings||0,
        low:      d.low_findings||0,
        info:     0
      };
      renderSeverityChart(sev);
    } else {
      renderThreatStrip({});
      renderSeverityChart({});
    }

    if (appsRes.ok) {
      var ad = await appsRes.json();
      renderAppRiskList(ad.items || []);
    } else {
      renderAppRiskList([]);
    }

    if (findingsRes.ok) {
      var topd = await findingsRes.json();
      renderTopVulns(topd.items || topd || []);
    } else {
      renderTopVulns([]);
    }
    
    renderThreatIntel();

  } catch(e) {
    console.error('Dashboard load error:', e);
    renderThreatStrip({});
    renderSeverityChart({});
    renderAppRiskList([]);
    renderTopVulns([]);
    renderThreatIntel();
    showToast('Failed to load dashboard data', 'error');
  }
}

document.addEventListener('DOMContentLoaded', function() {
  applyTheme(localStorage.getItem('theme') || 'dark');
  lucide.createIcons();
  loadDashboard();
});
</script>
